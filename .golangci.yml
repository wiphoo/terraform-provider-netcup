# golangci-lint configuration (v2 schema).
# https://golangci-lint.run/
#
# Keep this minimal during bootstrap. The "standard" set already enables
# errcheck, govet, ineffassign, staticcheck, and unused.
version: "2"

linters:
  default: standard
  settings:
    errcheck:
      # Ignoring errors when writing to stdout/stderr is idiomatic.
      exclude-functions:
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

formatters:
  enable:
    - gofmt
