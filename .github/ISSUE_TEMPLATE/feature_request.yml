name: Feature request
description: Propose a new feature for netcupctl or the Terraform provider
title: "feat: "
labels:
  - type/feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: >
        Describe the proposed behavior. For a Terraform resource or data source,
        include an example configuration. For a netcupctl command, show the
        intended usage.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component would this affect? (select all that apply)
      multiple: true
      options:
        - netcupctl CLI
        - Terraform provider (resource / data source)
        - SDK (pkg/netcup)
        - CI / release automation
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      description: How risky is the proposed behavior?
      options:
        - Safe / read-only
        - Low-risk write
        - Operational risk (e.g. restarts a server)
        - Destructive risk (e.g. wipes a disk, deletes a resource)
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: >
        Add any relevant context, SCP API documentation links, or prior art
        here.
