name: Bug report
description: Report a reproducible problem in netcupctl or the Terraform provider
title: "bug: "
labels:
  - type/bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the
        sections below. **Do not include tokens, credentials, or other
        sensitive values** anywhere in this report.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected? (select all that apply)
      multiple: true
      options:
        - netcupctl CLI
        - Terraform provider
        - SDK (pkg/netcup)
    validations:
      required: true
  - type: textarea
    id: configuration
    attributes:
      label: Configuration
      description: >
        For netcupctl bugs, include the command you ran (redact tokens). For
        Terraform provider bugs, include your configuration. Do not paste any
        tokens or credentials.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions and platform details.
      value: |
        - netcupctl/provider version:
        - Go version (if building from source):
        - Terraform version (provider bugs):
        - Operating system and architecture:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: >
        Paste any error messages or logs. **Do not include tokens, credentials,
        or other sensitive values.**
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context here.
